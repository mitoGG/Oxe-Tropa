<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Filmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">Vitrine <span>Filmes</span></h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar">
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Os melhores títulos em um só lugar.</h2>
        </section>

        <section class="movies">
            <h3>Filmes Populares</h3>
            <div class="movie-grid" id="movieGrid">
                <!-- Cards de filmes -->
                <div class="movie-card">
                    <img src="https://via.placeholder.com/200x300" alt="Filme 1">
                    <h4>Filme 1</h4>
                    <p>Descrição curta do filme 1.</p>
                </div>
                <div class="movie-card">
                    <img src="https://via.placeholder.com/200x300" alt="Filme 2">
                    <h4>Filme 2</h4>
                    <p>Descrição curta do filme 2.</p>
                </div>
                <div class="movie-card">
                    <img src="https://via.placeholder.com/200x300" alt="Filme 3">
                    <h4>Filme 3</h4>
                    <p>Descrição curta do filme 3.</p>
                </div>
                <!-- Você pode adicionar mais filmes aqui -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Vitrine de Filmes. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Função de busca simples
        const searchInput = document.getElementById('searchInput');
        const movieGrid = document.getElementById('movieGrid');
        const movieCards = movieGrid.getElementsByClassName('movie-card');

        searchInput.addEventListener('keyup', function() {
            const filter = searchInput.value.toLowerCase();
            for (let card of movieCards) {
                const title = card.querySelector('h4').textContent.toLowerCase();
                card.style.display = title.includes(filter) ? '' : 'none';
            }
        });
    </script>
</body>
</html>
